services:
  - type: web
    name: e-comsupport-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run prisma:migrate && npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: e-comsupport-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
databases:
  - name: e-comsupport-db
    plan: free
